name: One-time LinkedIn URL migration

on:
  push:
    paths:
      - .github/workflows/update-linkedin-url.yml

permissions:
  contents: write

jobs:
  update-linkedin-url:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace URL and regenerate manifest
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          old = "https://www.linkedin.com/in/logan-dixon-b1bb43329/"
          new = "https://www.linkedin.com/in/loganmdixon/"
          targets = [Path("index.html"), Path("scripts/verify_site.py")]

          for path in targets:
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"old LinkedIn URL not found in {path}")
              path.write_text(text.replace(old, new), encoding="utf-8", newline="\n")

          manifest = Path("SHA256SUMS.txt")
          lines = manifest.read_text(encoding="utf-8").splitlines()
          replacements = {}
          for path in targets:
              data = path.read_bytes().replace(b"\r\n", b"\n").replace(b"\r", b"\n")
              replacements[path.as_posix()] = hashlib.sha256(data).hexdigest()

          updated = []
          seen = set()
          for line in lines:
              if line and not line.startswith("#") and "  " in line:
                  _, relative = line.split("  ", 1)
                  if relative in replacements:
                      line = f"{replacements[relative]}  {relative}"
                      seen.add(relative)
              updated.append(line)

          missing = set(replacements) - seen
          if missing:
              raise SystemExit(f"manifest entries missing: {sorted(missing)}")

          manifest.write_text("\n".join(updated) + "\n", encoding="utf-8", newline="\n")
          PY

          rm .github/workflows/update-linkedin-url.yml
          bash run_all.sh

      - name: Commit migration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/verify_site.py SHA256SUMS.txt .github/workflows/update-linkedin-url.yml
          git commit -m "Update LinkedIn profile URL"
          git push
