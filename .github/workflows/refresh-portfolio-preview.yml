name: One-time portfolio preview refresh

on:
  push:
    paths:
      - .github/workflows/refresh-portfolio-preview.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install pillow
      - name: Generate current light-mode portfolio card
        run: |
          python - <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          from pathlib import Path
          import hashlib

          W, H = 1200, 630
          image = Image.new("RGB", (W, H), "#f7f5ef")
          draw = ImageDraw.Draw(image)

          def font(size, bold=False):
              candidates = [
                  "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf" if bold else "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf",
                  "/usr/share/fonts/truetype/liberation2/LiberationSans-Bold.ttf" if bold else "/usr/share/fonts/truetype/liberation2/LiberationSans-Regular.ttf",
              ]
              for path in candidates:
                  if Path(path).is_file():
                      return ImageFont.truetype(path, size)
              return ImageFont.load_default()

          ink = "#102a43"
          soft = "#334e68"
          muted = "#627d98"
          teal = "#0b5d65"
          line = "#d9e2ec"
          surface = "#fffdf8"

          for x in range(0, W, 46):
              draw.line((x, 0, x, H), fill="#e8e4da", width=1)
          for y in range(0, H, 46):
              draw.line((0, y, W, y), fill="#e8e4da", width=1)

          draw.rounded_rectangle((55, 48, 1145, 582), radius=30, fill=surface, outline=line, width=3)
          draw.text((92, 82), "LOGAN M. DIXON", font=font(24, True), fill=teal)
          draw.text((92, 130), "Mathematics, AI, and", font=font(59, True), fill=ink)
          draw.text((92, 198), "reproducible research", font=font(59, True), fill=teal)
          draw.text((94, 284), "Analytic structure, exact computation, and inspectable AI systems", font=font(27), fill=soft)

          cards = [
              ("Research", "SONC exactness · neural-network inversion"),
              ("Certified computation", "Exact algebra · interval arithmetic · claim maps"),
              ("AI systems", "RLVR · evaluation · retrieval · agents"),
              ("Education", "Bilingual AI Playgrounds · CS and AI curriculum"),
          ]
          x0, y0 = 92, 360
          cw, ch, gap = 470, 78, 20
          for i, (title, detail) in enumerate(cards):
              row, col = divmod(i, 2)
              x = x0 + col * (cw + gap)
              y = y0 + row * (ch + gap)
              draw.rounded_rectangle((x, y, x + cw, y + ch), radius=14, fill="#ffffff", outline=line, width=2)
              draw.text((x + 18, y + 12), title, font=font(20, True), fill=ink)
              draw.text((x + 18, y + 43), detail, font=font(16), fill=muted)

          draw.text((92, 548), "lmdixon23.github.io", font=font(20, True), fill=teal)
          image.save("preview.png", optimize=True)

          index = Path("index.html")
          text = index.read_text(encoding="utf-8")
          text = text.replace("https://lmdixon23.github.io/preview.png", "https://lmdixon23.github.io/preview.png?v=20260724")
          index.write_text(text, encoding="utf-8", newline="\n")

          manifest = Path("SHA256SUMS.txt")
          lines = manifest.read_text(encoding="utf-8").splitlines()
          targets = [Path("index.html"), Path("preview.png")]
          hashes = {}
          for path in targets:
              data = path.read_bytes()
              if path.suffix.lower() != ".png":
                  data = data.replace(b"\r\n", b"\n").replace(b"\r", b"\n")
              hashes[path.as_posix()] = hashlib.sha256(data).hexdigest()

          updated = []
          seen = set()
          for line in lines:
              if line and not line.startswith("#") and "  " in line:
                  _, relative = line.split("  ", 1)
                  if relative in hashes:
                      line = f"{hashes[relative]}  {relative}"
                      seen.add(relative)
              updated.append(line)
          missing = set(hashes) - seen
          if missing:
              raise SystemExit(f"manifest entries missing: {sorted(missing)}")
          manifest.write_text("\n".join(updated) + "\n", encoding="utf-8", newline="\n")
          PY
      - name: Verify and commit
        run: |
          rm .github/workflows/refresh-portfolio-preview.yml
          bash run_all.sh
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html preview.png SHA256SUMS.txt .github/workflows/refresh-portfolio-preview.yml
          git commit -m "Refresh portfolio social preview"
          git push
